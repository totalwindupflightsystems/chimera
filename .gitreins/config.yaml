# GitReins Configuration — Chimera

guards:
  secrets: true
  lint: true
  tests: true
  test_command: "pytest -x --tb=short -q"
  dead_code: true
  skylos: false

pipeline:
  stages:
    - id: tier1
      parallel: true
      on: [pre-commit, pre-eval]
      steps:
        - id: secrets
          type: script
          run: "bash .git/hooks/pre-commit-secrets"
          on_fail: block

        - id: lint
          type: script
          run: "ruff check src/ tests/ --quiet"
          on_fail: continue

        - id: tests
          type: script
          run: "pytest -x --tb=short -q"
          on_fail: continue

    - id: tier2
      type: ai_eval
      on: [pre-eval]
      condition: "true"
      max_iterations: 20
      tools: [read_file, run_command, search_pattern, read_diff, sandbox]

evaluator:
  max_iterations: 20
  model: deepseek-chat
