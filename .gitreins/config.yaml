# GitReins Configuration — Chimera

guards:
  secrets: true
  lint: true
  tests: true
  test_mode: "full"
  test_command: ".venv/bin/python -m pytest -x --tb=short -q --ignore=tests/integration --ignore=tests/compat"
  # dead_code: true  # TODO: noisy — whitelist 'from __future__ import annotations', FastAPI routes, __all__ exports, mutants/ dir
  skylos: false

pipeline:
  stages:
    - id: tier1
      parallel: true
      on: [pre-commit, pre-eval]
      steps:
        - id: guard
          type: script
          run: "gitreins guard"
          on_fail: block

    - id: tier2
      type: ai_eval
      on: [pre-eval]
      condition: "true"
      max_iterations: 40
      tools: [read_file, run_command, search_pattern, read_diff, sandbox, detect_dead_code]

evaluator:
  max_iterations: 40
  max_time: "10m"
  max_output_tokens: "200k"
  tool_call_weight: 0.1
  model: deepseek/deepseek-v4-pro

defaults:
  model: deepseek-v4-flash
  max_iterations: 100
  check_for_updates: true
  update_check_ttl: "24h"
