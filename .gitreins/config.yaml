guards:
  secrets: true
  lint: true
  tests: true
  test_mode: diff
  test_command: uv run pytest -x --tb=short
  dead_code: false
  skylos: false
  lsp: true
  lsp_tools:
  - pylsp
  static_analysis: true
  static_analysis_tools: {}
pipeline:
  stages:
  - id: tier1
    parallel: true
    true:
    - pre-commit
    - pre-eval
    steps:
    - id: guard
      type: script
      run: gitreins guard
      on_fail: block
  - id: tier2
    type: ai_eval
    true:
    - pre-eval
    condition: 'true'
    max_iterations: 50
    tools:
    - read_file
    - run_command
    - search_pattern
    - read_diff
    - sandbox
    - detect_dead_code
evaluator:
  max_iterations: 50
  max_time: 10m
  max_input_tokens: 0.2M
  max_output_tokens: 0.05M
  tool_call_weight: 0.1
  code_context_budget: 0.70
  compaction_threshold: 0.90
  lsp_diagnostics: true
  static_analysis_diagnostics: true
defaults:
  model: deepseek-v4-flash
  max_iterations: 100
  check_for_updates: true
  update_check_ttl: 24h
history:
  enabled: true
  storage: git
  max_verdicts: 1000
