<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chimera — Multi-Model Deliberation</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #30363d;
  --text: #c9d1d9;
  --text-secondary: #8b949e;
  --accent: #58a6ff;
  --green: #3fb950;
  --yellow: #d2991d;
  --red: #f85149;
  --purple: #a371f7;
  --radius: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; }
#sidebar { width: 320px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
#sidebar h2 { padding: 16px; font-size: 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
#sidebar h2 .logo { font-size: 24px; }
#session-info { padding: 12px 16px; font-size: 12px; color: var(--text-secondary); border-bottom: 1px solid var(--border); }
#history { flex: 1; overflow-y: auto; padding: 12px; }
.turn { margin-bottom: 12px; padding: 10px; background: var(--bg); border-radius: var(--radius); border: 1px solid var(--border); font-size: 13px; }
.turn-header { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 11px; color: var(--text-secondary); }
.turn-prompt { color: var(--accent); margin-bottom: 4px; word-break: break-word; }
.turn-answer { color: var(--green); word-break: break-word; }
.turn-stats { margin-top: 6px; font-size: 10px; color: var(--text-secondary); display: flex; gap: 12px; }
#controls { padding: 12px 16px; border-top: 1px solid var(--border); }
#controls label { display: block; font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; margin-top: 8px; }
#controls select, #controls input { width: 100%; padding: 6px 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 12px; }
#prompt-area { display: flex; gap: 6px; padding: 12px 16px; border-top: 1px solid var(--border); }
#prompt-area input { flex: 1; padding: 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 13px; }
#prompt-area button { padding: 8px 16px; background: var(--accent); border: none; border-radius: 4px; color: #fff; font-size: 13px; cursor: pointer; font-weight: 600; }
#prompt-area button:hover { opacity: 0.9; }
#prompt-area button:disabled { opacity: 0.4; cursor: default; }
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#dag-panel { flex: 1; overflow: auto; padding: 20px; display: flex; align-items: center; justify-content: center; }
#dag-panel .mermaid { background: var(--surface); border-radius: var(--radius); padding: 20px; min-width: 400px; }
#token-bar { padding: 12px 20px; border-top: 1px solid var(--border); background: var(--surface); display: flex; gap: 24px; font-size: 12px; }
.token-stat { display: flex; flex-direction: column; }
.token-stat .label { color: var(--text-secondary); font-size: 10px; }
.token-stat .value { font-size: 16px; font-weight: 600; }
.token-stat .value.cost { color: var(--yellow); }
.token-stat .value.tokens { color: var(--accent); }
.token-stat .value.time { color: var(--purple); }
#result-panel { max-height: 30%; overflow-y: auto; padding: 16px 20px; border-top: 1px solid var(--border); background: var(--surface); }
#result-panel h3 { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; }
#result-text { white-space: pre-wrap; font-size: 14px; line-height: 1.5; }
#status { padding: 4px 20px; font-size: 11px; color: var(--text-secondary); min-height: 20px; }
#status .live { color: var(--green); }
#status .error { color: var(--red); }
.spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--text-secondary); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="sidebar">
  <h2><span class="logo">🦁</span> Chimera</h2>
  <div id="session-info">Session: —</div>
  <div id="history"></div>
  <div id="controls">
    <label>Formation</label>
    <select id="formation-select">
      <option value="auto">Auto</option>
      <option value="simple">Simple</option>
      <option value="debate">Debate</option>
      <option value="audit">Audit</option>
    </select>
    <label>Aggregator model (optional)</label>
    <input id="aggregator-model" placeholder="e.g. deepseek/deepseek-v4-flash" type="text">
  </div>
  <div id="prompt-area">
    <input id="prompt-input" placeholder="Ask anything..." type="text">
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>
</div>

<div id="main">
  <div id="dag-panel">
    <pre class="mermaid" id="dag-viz">flowchart TB
    start["Send a prompt to begin"]
    style start fill:#30363d,stroke:#58a6ff,color:#c9d1d9</pre>
  </div>
  <div id="token-bar">
    <div class="token-stat"><span class="label">Tokens</span><span class="value tokens" id="stat-tokens">—</span></div>
    <div class="token-stat"><span class="label">Cost</span><span class="value cost" id="stat-cost">—</span></div>
    <div class="token-stat"><span class="label">Time</span><span class="value time" id="stat-time">—</span></div>
    <div class="token-stat"><span class="label">Stages</span><span class="value" id="stat-stages">—</span></div>
  </div>
  <div id="status"></div>
  <div id="result-panel">
    <h3>Result</h3>
    <div id="result-text"></div>
  </div>
</div>

<script>
// ── State ──
let sessionId = null;
let eventSource = null;

// ── Init ──
mermaid.initialize({ startOnLoad: false, theme: 'dark', securityLevel: 'loose' });

(async function init() {
  const r = await fetch('/web/sessions', { method: 'POST' });
  const data = await r.json();
  sessionId = data.session_id;
  document.getElementById('session-info').textContent = `Session: ${sessionId}`;
  connectSSE();
  document.getElementById('prompt-input').focus();
})();

// ── SSE ──
function connectSSE() {
  if (eventSource) eventSource.close();
  eventSource = new EventSource(`/web/sse/${sessionId}`);

  eventSource.addEventListener('deliberation_started', () => {
    setStatus('live', 'Thinking...');
    document.getElementById('send-btn').disabled = true;
  });

  eventSource.addEventListener('dag_designed', (e) => {
    const data = JSON.parse(e.data);
    document.getElementById('dag-viz').textContent = data.mermaid;
    document.getElementById('stat-stages').textContent = data.stage_count;
    mermaid.run({ nodes: [document.getElementById('dag-viz')] });
  });

  eventSource.addEventListener('deliberation_done', (e) => {
    const data = JSON.parse(e.data);
    document.getElementById('result-text').textContent = data.answer;
    document.getElementById('stat-tokens').textContent = fmtNum(data.total_tokens);
    document.getElementById('stat-cost').textContent = '$' + data.total_cost.toFixed(6);
    document.getElementById('stat-time').textContent = fmtMs(data.elapsed_ms);
    document.getElementById('send-btn').disabled = false;
    document.getElementById('prompt-input').focus();
    setStatus('', `Done — turn ${data.turn_number}`);
    loadHistory();
  });

  eventSource.onerror = () => {
    setStatus('error', 'SSE disconnected — reconnecting...');
    setTimeout(connectSSE, 2000);
  };
}

// ── Send ──
async function sendMessage() {
  const input = document.getElementById('prompt-input');
  const prompt = input.value.trim();
  if (!prompt || !sessionId) return;
  input.value = '';

  const formation = document.getElementById('formation-select').value;
  const aggModel = document.getElementById('aggregator-model').value.trim();

  const body = { prompt, formation };
  if (aggModel) body.aggregator_model = aggModel;

  document.getElementById('send-btn').disabled = true;
  setStatus('live', 'Sending...');

  try {
    const r = await fetch(`/web/sessions/${sessionId}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!r.ok) {
      const err = await r.text();
      setStatus('error', `Error: ${r.status} — ${err.slice(0, 200)}`);
      document.getElementById('send-btn').disabled = false;
      return;
    }
    const data = await r.json();
    // SSE already updated DAG — just refresh final state
    document.getElementById('result-text').textContent = data.answer;
    document.getElementById('dag-viz').textContent = data.mermaid;
    mermaid.run({ nodes: [document.getElementById('dag-viz')] });
    document.getElementById('stat-tokens').textContent = fmtNum(data.trace.total_tokens);
    document.getElementById('stat-cost').textContent = '$' + data.trace.total_cost.toFixed(6);
    loadHistory();
  } catch (err) {
    setStatus('error', `Network error: ${err.message}`);
    document.getElementById('send-btn').disabled = false;
  }
}

// ── History ──
async function loadHistory() {
  if (!sessionId) return;
  const r = await fetch(`/web/sessions/${sessionId}`);
  const data = await r.json();
  const el = document.getElementById('history');
  el.innerHTML = data.turns.map((t, i) => `
    <div class="turn">
      <div class="turn-header"><span>Turn ${i + 1}</span><span>${t.formation} · ${shortModel(t.aggregator_model)}</span></div>
      <div class="turn-prompt">${escHtml(t.user_prompt.slice(0, 100))}</div>
      <div class="turn-answer">${escHtml(t.answer.slice(0, 200))}</div>
      <div class="turn-stats">
        <span>${fmtNum(t.total_tokens)} tok</span>
        <span>$${t.total_cost.toFixed(6)}</span>
      </div>
    </div>
  `).reverse().join('');
  el.scrollTop = el.scrollHeight;
}

// ── Helpers ──
function setStatus(cls, msg) {
  const el = document.getElementById('status');
  el.innerHTML = cls ? `<span class="${cls}"><span class="spinner"></span>${msg}</span>` : msg;
}
function fmtNum(n) { return n != null ? n.toLocaleString() : '—'; }
function fmtMs(ms) { return ms >= 1000 ? (ms/1000).toFixed(1) + 's' : ms + 'ms'; }
function shortModel(m) { return m ? m.split('/').pop() : '—'; }
function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// Enter to send
document.getElementById('prompt-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendMessage();
});
</script>

</body>
</html>
