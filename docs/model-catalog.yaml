# =========================================================================
# SOURCES & METHODOLOGY
# =========================================================================
#
# Pricing:
#   - OpenRouter model pages (openrouter.ai)
#   - Provider API docs (platform.claude.com, api-docs.deepseek.com, etc.)
#   - Artificial Analysis (artificialanalysis.ai)
#   - llm-stats.com, felloai.com, costgoat.com
#
# Benchmarks:
#   - SWE-bench Verified / Pro: Anthropic, Google, Qwen official model cards
#   - AIME 2025/2026: Together AI model cards, DataCamp reviews
#   - GPQA Diamond: Official model cards, BenchLM.ai
#   - Terminal-Bench 2.0: DataCamp, Together AI
#   - Code Arena / LiveCodeBench: LMArena, BenchLM.ai
#   - Claude benchmarks: morphllm.com/claude-benchmarks (comprehensive)
#
# Category Weight Methodology:
#   - code: Primarily SWE-bench Verified + LiveCodeBench + Code Arena ELO
#   - analysis: GPQA Diamond + MMLU-Pro + document understanding benchmarks
#   - reasoning: AIME + MATH + FrontierMath + multi-step reasoning scores
#   - design: Chatbot Arena ELO + creative writing benchmarks + UI/UX eval
#   - audit: Code review ability + security analysis + SWE-bench debugging
#
# Models NOT found / uncertain:
#   - "GPT-5.5-mini": does not exist; closest is GPT-5.5 Instant (May 2026)
#   - "Gemini 3.5 Flash Lite": does not exist; closest is Gemini 3.1 Flash Lite
#   - "Qwen3.7 Turbo": does not exist as separate model; Qwen3.7-Plus is the "fast" tier
#   - "Fable 5": confirmed as "anthropic/claude-fable-5" but suspended June 12, 2026
#
# Key model ID formats (for OpenRouter / direct API):
#   OpenRouter:  provider/model-id  (e.g., openai/gpt-5.5, anthropic/claude-opus-4.8)
#   Direct:      just model-id        (e.g., gpt-5.5, claude-opus-4-8)
#   Z.AI:        zai-coding-plan/glm-5.2 (existing chimera format, keep for now)
